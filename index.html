<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLISS | Sync_Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>

<body>
    <div class="scanlines"></div>

    <div id="idModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="cyber-header">IDENTIFY_YOURSELF</h2>
            <input type="text" id="usernameInput" class="neon-input" placeholder="ENTER_CODENAME..." autocomplete="off">
            <button id="confirmIdBtn" class="cyb-btn-mini">INITIALIZE_SESSION</button>
        </div>
    </div>

    <div class="app-content">
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning blink"></i>
                <span>BLISS</span>
            </div>
            <ul class="mobile-nav">
                <li id="homeBtn" class="active_cyb"><i class="fa-solid fa-house"></i></li>
                <li id="libraryBtn"><i class="fa-solid fa-music"></i></li>
            </ul>

            <div class="chat-terminal">
                <div class="chat-header" id="roomDisplay">SYSTEM: OFFLINE</div>
                <div class="room-selector">
                    <input type="text" id="roomInput" placeholder="ROOM_CODE..">
                    <button id="joinRoomBtn"><i class="fa-solid fa-key"></i></button>
                </div>
                <div id="chatBox" class="chat-display">
                </div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" placeholder="LOCKED.." disabled>
                    <i class="fa-solid fa-paper-plane" id="sendMsgBtn"></i>
                </div>
            </div>
        </nav>

        <main class="main-view">
            <section id="homeSection">
                <h1 class="cyber-header">TERMINAL_STATUS</h1>
                <div class="dashboard-grid">
                    <div class="db-card-cyb">
                        <h3 style="color:var(--primary); margin-bottom:5px; font-size: 0.9rem;">METRICS</h3>
                        <p style="font-size: 0.85rem;">CPU: 24% | TEMP: 42°C</p>
                    </div>
                    <div class="db-card-cyb">
                        <h3 style="color:var(--primary); margin-bottom:5px; font-size: 0.9rem;">DAILY_ZEN</h3>
                        <p id="cyberQuote" style="font-size: 0.85rem; margin-bottom: 10px;">"Syncing with the void."</p>
                        <button class="cyb-btn-mini" onclick="newQuote()"
                            style="width: auto; padding: 5px 15px; font-size: 0.7rem;">REFRESH</button>
                    </div>
                </div>
            </section>

            <section id="playlistSection" style="display: none;">
                <h1 class="cyber-header">AUDIO_ARCHIVES</h1>
                <input type="text" id="librarySearch" class="neon-input" placeholder="SEARCH_ARCHIVES...">
                <div class="song-item-list" id="songItemContainer">
                </div>
            </section>
        </main>
    </div>

    <footer class="bottom-player">
        <div class="progress-row">
            <span id="timeCounter" class="time-text">0:00 / 0:00</span>
            <input type="range" id="myProgressBar" min="0" value="0" max="100" step="0.1">
        </div>

        <div class="controls-row">
            <div class="song-info"><span id="masterSongName">SELECT_TRACK</span></div>

            <div class="main-icons">
                <i class="fas fa-repeat" id="repeatBtn"></i>
                <i class="fas fa-step-backward" id="previous"></i>
                <i class="far fa-play-circle" id="masterPlay"></i>
                <i class="fas fa-step-forward" id="next"></i>
            </div>

            <div class="vol-mobile">
                <i id="volIcon" class="fa-solid fa-volume-high" style="color:var(--primary); font-size: 0.8rem;"></i>
                <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
