<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLISS | Mobile_Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="scanlines"></div>

    <div id="idModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="cyber-header">IDENTIFY_YOURSELF</h2>
            <input type="text" id="usernameInput" class="neon-input" placeholder="ENTER_CODENAME..." autocomplete="off">
            <button id="confirmIdBtn" class="cyb-btn-mini">INITIALIZE_SESSION</button>
        </div>
    </div>

    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning blink"></i> 
                <span>BLISS</span>
            </div>
            <ul class="nav-tabs">
                <li id="homeBtn" class="active_cyb"><i class="fa-solid fa-house"></i></li>
                <li id="libraryBtn"><i class="fa-solid fa-music"></i></li>
            </ul>
        </header>

        <main class="content-area">
            <section id="homeSection">
                <div class="chat-terminal">
                    <div class="chat-header" id="roomDisplay">SYSTEM: OFFLINE</div>
                    <div class="room-selector">
                        <input type="text" id="roomInput" placeholder="ROOM_CODE..">
                        <button id="joinRoomBtn"><i class="fa-solid fa-key"></i></button>
                    </div>
                    <div id="chatBox" class="chat-display"></div>
                    <div class="chat-input-wrap">
                        <input type="text" id="chatInput" placeholder="LOCKED.." disabled>
                        <i class="fa-solid fa-paper-plane" id="sendMsgBtn"></i>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="db-card-cyb">
                        <h3>METRICS</h3>
                        <p>CPU: 24% | MEM: ACTIVE</p>
                    </div>
                    <div class="db-card-cyb">
                        <h3>GOOGLE_CORE</h3>
                        <form action="https://www.google.com/search" method="GET" target="_blank">
                            <input type="text" name="q" class="neon-input" placeholder="SEARCH_NET...">
                        </form>
                    </div>
                </div>
            </section>

            <section id="playlistSection" style="display: none;">
                <h1 class="cyber-header">AUDIO_ARCHIVES</h1>
                <input type="text" id="librarySearch" class="neon-input" placeholder="FIND_TRACK...">
                <div class="song-item-list" id="songItemContainer"></div>
            </section>
        </main>

        <footer class="player">
            <div class="progress-container">
                <span id="timeCounter">0:00 / 0:00</span>
                <input type="range" id="myProgressBar" min="0" value="0" max="100" step="0.1">
            </div>
            <div class="player-controls">
                <div class="song-details">
                    <span id="masterSongName">SELECT_TRACK</span>
                </div>
                <div class="main-buttons">
                    <i class="fas fa-repeat" id="repeatBtn"></i>
                    <i class="fas fa-step-backward" id="previous"></i>
                    <i class="far fa-play-circle" id="masterPlay"></i>
                    <i class="fas fa-step-forward" id="next"></i>
                </div>
                <div class="volume-box">
                    <i class="fa-solid fa-volume-high"></i>
                    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
